# 构建期镜像源（可通过 .env 或环境变量覆盖）
x-pip-build-args: &pip-build-args
  PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
  PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-mirrors.aliyun.com}
  PIP_DEFAULT_TIMEOUT: ${PIP_DEFAULT_TIMEOUT:-300}
  PIP_RETRIES: ${PIP_RETRIES:-5}
  UV_INDEX_URL: ${UV_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
  UV_VERSION: ${UV_VERSION:-0.11.19}
  UV_HTTP_TIMEOUT: ${UV_HTTP_TIMEOUT:-300}
  PYPI_FILES_MIRROR: ${PYPI_FILES_MIRROR-https://mirrors.aliyun.com/pypi/packages/}
  NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com}

services:
  # ==================== 基础设施 ====================

  opencitadel-redis:
    image: redis:7-alpine
    container_name: opencitadel-redis
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 256m
    cpus: "0.50"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - opencitadel-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  opencitadel-postgres:
    image: pgvector/pgvector:pg16
    container_name: opencitadel-postgres
    restart: unless-stopped
    mem_limit: 1024m
    mem_reservation: 512m
    cpus: "1.50"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-opencitadel}
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=768MB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - max_connections=100
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - opencitadel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-opencitadel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  opencitadel-minio:
    profiles:
      - local
    image: minio/minio:latest
    container_name: opencitadel-minio
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 256m
    cpus: "0.50"
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    networks:
      - opencitadel-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== 沙箱服务 ====================

  opencitadel-sandbox:
    profiles:
      - fixed-sandbox
    build:
      context: ./sandbox
      dockerfile: Dockerfile
      args:
        <<: *pip-build-args
    image: opencitadel-sandbox
    container_name: opencitadel-sandbox
    restart: "no"
    mem_limit: 1g
    networks:
      - opencitadel-network

  # ==================== 数据库迁移 (一次性) ====================

  opencitadel-migrate:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: api
      args:
        <<: *pip-build-args
    image: opencitadel-migrate
    mem_limit: 512m
    env_file:
      - .env
    depends_on:
      opencitadel-postgres:
        condition: service_healthy
    networks:
      - opencitadel-network
    command: ["python", "-m", "app.migrate"]
    restart: "no"

  # ==================== 后端 API ====================

  opencitadel-api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: api
      args:
        <<: *pip-build-args
    image: opencitadel-api
    container_name: opencitadel-api
    restart: unless-stopped
    mem_limit: 640m
    mem_reservation: 384m
    cpus: "2.00"
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./api/config.yaml:/app/config.yaml
    depends_on:
      opencitadel-redis:
        condition: service_healthy
      opencitadel-postgres:
        condition: service_healthy
      opencitadel-migrate:
        condition: service_completed_successfully
    networks:
      - opencitadel-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/status"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ==================== Agent Worker ====================

  opencitadel-worker:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: worker
      args:
        <<: *pip-build-args
    image: opencitadel-worker
    container_name: opencitadel-worker
    restart: unless-stopped
    mem_limit: 1024m
    mem_reservation: 512m
    cpus: "2.00"
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./api/config.yaml:/app/config.yaml
    depends_on:
      opencitadel-redis:
        condition: service_healthy
      opencitadel-postgres:
        condition: service_healthy
      opencitadel-migrate:
        condition: service_completed_successfully
    networks:
      - opencitadel-network
    command: ["./worker.sh"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, redis; redis.Redis(host=os.getenv('REDIS_HOST','localhost'), port=int(os.getenv('REDIS_PORT','6379')), password=os.getenv('REDIS_PASSWORD') or None).ping()\""]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== 前端 UI ====================

  opencitadel-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com}
    image: opencitadel-ui
    container_name: opencitadel-ui
    restart: unless-stopped
    mem_limit: 384m
    mem_reservation: 192m
    cpus: "1.00"
    depends_on:
      opencitadel-api:
        condition: service_healthy
    networks:
      - opencitadel-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==================== Demo: OpsConsole 样板工单后台 ====================

  ops-console:
    profiles:
      - demo
    build:
      context: ./demo/ops-console
      dockerfile: Dockerfile
    image: opencitadel-ops-console
    container_name: opencitadel-ops-console
    restart: unless-stopped
    mem_limit: 256m
    cpus: "0.50"
    networks:
      - opencitadel-network
    ports:
      - "${OPS_CONSOLE_PORT:-9099}:9099"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9099/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==================== Nginx 网关 ====================

  opencitadel-nginx:
    image: nginx:alpine
    container_name: opencitadel-nginx
    restart: unless-stopped
    mem_limit: 128m
    mem_reservation: 64m
    cpus: "0.50"
    environment:
      OPENCITADEL_DOMAIN: ${OPENCITADEL_DOMAIN:-}
      HTTPS_ENABLED: ${HTTPS_ENABLED:-false}
    ports:
      - "${NGINX_PORT:-8088}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/generate-config.sh:/docker-entrypoint.d/40-generate-config.sh:ro
      - nginx_conf:/etc/nginx/conf.d
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      opencitadel-ui:
        condition: service_healthy
      opencitadel-api:
        condition: service_healthy
    networks:
      - opencitadel-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

# ==================== 数据卷 ====================
volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
  minio_data:
    driver: local
  nginx_conf:
    driver: local

# ==================== 网络 ====================
networks:
  opencitadel-network:
    name: opencitadel-network
    driver: bridge
