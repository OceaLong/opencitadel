services:
  # ==================== 基础设施 ====================

  manus-redis:
    image: redis:7-alpine
    container_name: manus-redis
    restart: unless-stopped
    mem_limit: 512m
    cpus: "0.50"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - manus-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  manus-postgres:
    image: pgvector/pgvector:pg16
    container_name: manus-postgres
    restart: unless-stopped
    mem_limit: 2g
    cpus: "1.50"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-manus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - manus-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-manus}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== 沙箱服务 ====================

  manus-sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    image: manus-sandbox
    container_name: manus-sandbox
    restart: "no"
    networks:
      - manus-network

  # ==================== 数据库迁移 (一次性) ====================

  manus-migrate:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: api
    container_name: manus-migrate
    env_file:
      - .env
    depends_on:
      manus-postgres:
        condition: service_healthy
    networks:
      - manus-network
    command: ["python", "-m", "app.migrate"]
    restart: "no"

  # ==================== 后端 API ====================

  manus-api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: api
    image: manus-api
    container_name: manus-api
    restart: unless-stopped
    mem_limit: 2g
    cpus: "2.00"
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./api/config.yaml:/app/config.yaml
    depends_on:
      manus-redis:
        condition: service_healthy
      manus-postgres:
        condition: service_healthy
      manus-migrate:
        condition: service_completed_successfully
    networks:
      - manus-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/status"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ==================== Agent Worker ====================

  manus-worker:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: worker
    image: manus-worker
    container_name: manus-worker
    restart: unless-stopped
    mem_limit: 4g
    cpus: "2.00"
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./api/config.yaml:/app/config.yaml
    depends_on:
      manus-redis:
        condition: service_healthy
      manus-postgres:
        condition: service_healthy
      manus-migrate:
        condition: service_completed_successfully
    networks:
      - manus-network
    command: ["./worker.sh"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, redis; redis.Redis(host=os.getenv('REDIS_HOST','localhost'), port=int(os.getenv('REDIS_PORT','6379')), password=os.getenv('REDIS_PASSWORD') or None).ping()\""]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== 前端 UI ====================

  manus-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
    container_name: manus-ui
    restart: unless-stopped
    mem_limit: 1g
    cpus: "1.00"
    depends_on:
      manus-api:
        condition: service_healthy
    networks:
      - manus-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ==================== Nginx 网关 ====================

  manus-nginx:
    image: nginx:alpine
    container_name: manus-nginx
    restart: unless-stopped
    mem_limit: 256m
    cpus: "0.50"
    ports:
      - "${NGINX_PORT:-8088}:80"
      # 如需启用 HTTPS，取消以下注释
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # 直接挂载系统 Let's Encrypt 证书目录
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      manus-ui:
        condition: service_healthy
      manus-api:
        condition: service_healthy
    networks:
      - manus-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

# ==================== 数据卷 ====================
volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local

# ==================== 网络 ====================
networks:
  manus-network:
    name: manus-network
    driver: bridge
