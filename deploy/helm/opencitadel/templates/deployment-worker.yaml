apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opencitadel.fullname" . }}-worker
  labels:
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.replicaCount.worker }}
  selector:
    matchLabels:
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/component: worker
    spec:
      {{- if .Values.rbac.create }}
      serviceAccountName: {{ include "opencitadel.fullname" . }}-worker
      {{- end }}
      {{- $secretName := printf "%s-secret" (include "opencitadel.fullname" .) }}
      {{- $configName := printf "%s-config" (include "opencitadel.fullname" .) }}
      containers:
        - name: worker
          image: "{{ .Values.image.worker.repository }}:{{ .Values.image.worker.tag }}"
          imagePullPolicy: {{ .Values.image.worker.pullPolicy }}
          command: ["./worker.sh"]
          readinessProbe:
            exec:
              command: ["python", "-c", "import redis; print('ok')"]
            initialDelaySeconds: 15
            periodSeconds: 30
          livenessProbe:
            exec:
              command: ["python", "-c", "import redis; print('ok')"]
            initialDelaySeconds: 30
            periodSeconds: 60
          resources:
            {{- toYaml .Values.resources.worker | nindent 12 }}
          envFrom:
            - secretRef:
                name: {{ $secretName }}
          env:
            {{- range $key, $value := .Values.env }}
            {{- if and (ne $key "POSTGRES_HOST") (ne $key "REDIS_HOST") (ne $key "MINIO_ENDPOINT") }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
            - name: POSTGRES_HOST
              value: {{ include "opencitadel.postgresHost" . | quote }}
            - name: REDIS_HOST
              value: {{ include "opencitadel.redisHost" . | quote }}
            - name: MINIO_ENDPOINT
              value: {{ include "opencitadel.minioEndpoint" . | quote }}
            - name: OPENCITADEL_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: app-config
              mountPath: /app/config.yaml
              subPath: config.yaml
      volumes:
        - name: app-config
          configMap:
            name: {{ $configName }}
