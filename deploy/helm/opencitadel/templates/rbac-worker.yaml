{{- if .Values.rbac.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "opencitadel.fullname" . }}-worker
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "opencitadel.fullname" . }}-worker-sandbox
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "delete", "get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "opencitadel.fullname" . }}-worker-sandbox
subjects:
  - kind: ServiceAccount
    name: {{ include "opencitadel.fullname" . }}-worker
roleRef:
  kind: Role
  name: {{ include "opencitadel.fullname" . }}-worker-sandbox
  apiGroup: rbac.authorization.k8s.io
{{- end }}
