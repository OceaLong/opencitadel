{{- if .Values.minio.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "opencitadel.fullname" . }}-minio
spec:
  serviceName: {{ include "opencitadel.fullname" . }}-minio
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/component: minio
    spec:
      containers:
        - name: minio
          image: {{ .Values.minio.image }}
          args: ["server", "/data"]
          ports:
            - containerPort: 9000
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-secret" (include "opencitadel.fullname" .) }}
                  key: MINIO_ACCESS_KEY
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-secret" (include "opencitadel.fullname" .) }}
                  key: MINIO_SECRET_KEY
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.minio.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.minio.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "opencitadel.fullname" . }}-minio
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/component: minio
  ports:
    - port: 9000
      targetPort: 9000
{{- end }}
