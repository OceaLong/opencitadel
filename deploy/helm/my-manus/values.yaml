replicaCount:
  api: 2
  worker: 2
  ui: 1

image:
  api:
    repository: manus-api
    tag: latest
    pullPolicy: IfNotPresent
  worker:
    repository: manus-worker
    tag: latest
    pullPolicy: IfNotPresent
  ui:
    repository: manus-ui
    tag: latest
    pullPolicy: IfNotPresent
  sandbox:
    repository: manus-sandbox
    tag: latest

ui:
  enabled: true

rbac:
  create: true

postgresql:
  enabled: true
  image: pgvector/pgvector:pg16
  user: postgres
  database: manus
  storage: 20Gi
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1500m
      memory: 1Gi

redis:
  enabled: true
  image: redis:7-alpine
  storage: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

resourceQuota:
  enabled: true
  maxSandboxPods: "20"
  requestsMemory: "20Gi"

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  host: my-manus.local
  className: ""
  annotations: {}

autoscaling:
  api:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  worker:
    enabled: true
    minReplicas: 2
    maxReplicas: 20
    targetCPUUtilizationPercentage: 75

resources:
  api:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2
      memory: 1Gi
  worker:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2
      memory: 1024Mi
  ui:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 384Mi

# 非敏感环境变量（对应 api/core/config.py Settings）
env:
  ENV: production
  LOG_LEVEL: INFO
  APP_CONFIG_FILEPATH: config.yaml
  POSTGRES_HOST: my-manus-postgres
  POSTGRES_USER: postgres
  POSTGRES_DB: manus
  REDIS_HOST: my-manus-redis
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  USE_DB_APP_CONFIG: "true"
  COS_REGION: ""
  COS_SCHEME: https
  COS_BUCKET: ""
  COS_DOMAIN: ""

# 敏感配置（渲染为 Secret，通过 envFrom 注入）
secrets:
  apiKeySecret: replace-with-strong-random-secret
  postgresPassword: postgres
  redisPassword: ""
  cosSecretId: ""
  cosSecretKey: ""
  embeddingApiKey: ""
  langfusePublicKey: ""
  langfuseSecretKey: ""

# 应用行为配置（渲染为 ConfigMap，挂载为 /app/config.yaml）
appConfig:
  server:
    cors_origins: '*'
    rate_limit_enabled: true
    rate_limit_per_minute: 120
    sessions_stream_interval_seconds: 15
    marketplace_max_upload_bytes: 26214400
  agent_config:
    max_iterations: 100
    max_retries: 3
    max_search_results: 10
  memory:
    recall_limit: 20
    auto_extract_enabled: true
    vector_enabled: false
    compact_strategy: hybrid
    compact_token_threshold: 32000
    compact_keep_recent: 12
    compact_tool_content_max_chars: 2000
    embedding:
      provider: openai
      model: text-embedding-3-small
      base_url: https://api.openai.com/v1
  sandbox:
    driver: kubernetes
    address: null
    image: manus-sandbox
    name_prefix: manus-sandbox
    ttl_minutes: 20
    network: null
    chrome_args: ''
    https_proxy: null
    http_proxy: null
    no_proxy: localhost,127.0.0.1
    cleanup_interval_seconds: 60
    memory_limit: 1g
    cpu_limit: 2
    pids_limit: 512
    pool_enabled: false
    pool_size: 0
    idle_timeout_minutes: 10
    warmup_retry_interval_seconds: 0.5
    k8s_namespace: default
    k8s_pod_label: app=manus-sandbox
  worker:
    max_concurrent_tasks: 4
    task_dispatch_max_retries: 3
    tool_timeout_seconds: 120
    max_sandboxes_per_node: 4
    max_dynamic_sandboxes_global: 0
    admission_min_host_available_mb: 3072
    admission_reclaim_target_mb: 4096
    admission_poll_interval_seconds: 2
    admission_settle_seconds: 8
    admission_reclaim_enabled: true
    task_execution_lease_seconds: 60
    reclaim_leader_lease_seconds: 15
    memory_probe_source: auto
  streams:
    dispatch_maxlen: 10000
    task_input_maxlen: 10000
    task_output_maxlen: 50000
    stream_maxlen: 10000
  observability:
    otel_enabled: false
    otel_service_name: my-manus-api
    otel_exporter_endpoint: ''
    langfuse_enabled: false
  mcp_config:
    mcpServers:
      amap-maps-streamableHTTP:
        transport: streamable_http
        enabled: false
        description: null
        env: null
        command: null
        args: null
        url: https://mcp.amap.com/mcp?key=YOUR_AMAP_KEY
        headers: null
      jina-mcp-server:
        transport: streamable_http
        enabled: false
        description: null
        env: null
        command: null
        args: null
        url: https://mcp.jina.ai/v1
        headers:
          Authorization: Bearer YOUR_JINA_API_KEY
  a2a_config:
    a2a_servers: []
  model_resilience:
    enabled: true
    fallback_enabled: false
    allow_cross_provider_fallback: false
    max_attempts_per_call: 3
    max_call_budget_seconds: 120
    breaker_window_seconds: 60
    breaker_error_threshold: 5
    breaker_open_ttl_seconds: 60
    breaker_halfopen_probe_timeout_seconds: 10
    fast_fail_on_open_circuit: true
    dlq_replay_enabled: false
    dlq_replay_batch_size: 4
    dlq_replay_interval_seconds: 5
  feature_flags:
    enable_agent_features: true
    enable_marketplace_llm_apps: true
    enable_embeddings: true
    enable_image_generation: true

migrate:
  enabled: true
