apiVersion: v1
kind: Secret
metadata:
  name: {{ include "my-manus.fullname" . }}-secret
  labels:
    app.kubernetes.io/name: {{ include "my-manus.fullname" . }}
type: Opaque
stringData:
  API_KEY_SECRET: {{ .Values.secrets.apiKeySecret | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | quote }}
  COS_SECRET_ID: {{ .Values.secrets.cosSecretId | quote }}
  COS_SECRET_KEY: {{ .Values.secrets.cosSecretKey | quote }}
  MINIO_ACCESS_KEY: {{ .Values.secrets.minioAccessKey | quote }}
  MINIO_SECRET_KEY: {{ .Values.secrets.minioSecretKey | quote }}
  EMBEDDING_API_KEY: {{ .Values.secrets.embeddingApiKey | quote }}
  LANGFUSE_PUBLIC_KEY: {{ .Values.secrets.langfusePublicKey | quote }}
  LANGFUSE_SECRET_KEY: {{ .Values.secrets.langfuseSecretKey | quote }}
