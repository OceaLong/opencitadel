apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "my-manus.fullname" . }}-worker
  labels:
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.replicaCount.worker }}
  selector:
    matchLabels:
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.image.worker.repository }}:{{ .Values.image.worker.tag }}"
          imagePullPolicy: {{ .Values.image.worker.pullPolicy }}
          command: ["./worker.sh"]
          readinessProbe:
            exec:
              command: ["python", "-c", "import redis; print('ok')"]
            initialDelaySeconds: 15
            periodSeconds: 30
          livenessProbe:
            exec:
              command: ["python", "-c", "import redis; print('ok')"]
            initialDelaySeconds: 30
            periodSeconds: 60
          resources:
            {{- toYaml .Values.resources.worker | nindent 12 }}
