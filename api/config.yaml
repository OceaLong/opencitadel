# 应用运行时配置（仅作种子/默认值；生产环境运行时来源为 PostgreSQL app_configs 表，USE_DB_APP_CONFIG=true）
server:
  cors_origins: '*'
  rate_limit_enabled: true
  rate_limit_per_minute: 120
  sessions_stream_interval_seconds: 15
  marketplace_max_upload_bytes: 26214400

agent_config:
  max_iterations: 100
  max_retries: 3
  max_search_results: 10

memory:
  recall_limit: 20
  auto_extract_enabled: true
  vector_enabled: false
  compact_strategy: hybrid
  compact_token_threshold: 32000
  compact_keep_recent: 12
  compact_tool_content_max_chars: 2000
  compact_always_on_step_boundary: true
  compact_rule_trigger_threshold: 16000
  tool_output_offload_enabled: false
  tool_output_offload_threshold_chars: 4000
  embedding:
    provider: openai
    model: text-embedding-3-small
    base_url: https://api.openai.com/v1

sandbox:
  driver: auto
  address: null
  image: opencitadel-sandbox
  name_prefix: opencitadel-sandbox
  ttl_minutes: 20
  network: opencitadel-network
  chrome_args: ''
  https_proxy: null
  http_proxy: null
  no_proxy: localhost,127.0.0.1,opencitadel-api,opencitadel-ui,opencitadel-redis,opencitadel-postgres
  cleanup_interval_seconds: 60
  memory_limit: 1g
  cpu_limit: 2
  pids_limit: 512
  pool_enabled: false
  pool_size: 0
  idle_timeout_minutes: 10
  warmup_retry_interval_seconds: 0.5
  k8s_namespace: default
  k8s_pod_label: app=opencitadel-sandbox

worker:
  max_concurrent_tasks: 4
  task_dispatch_max_retries: 3
  tool_timeout_seconds: 120
  mcp_connect_timeout_seconds: 30
  max_sandboxes_per_node: 4
  max_dynamic_sandboxes_global: 0
  admission_min_host_available_mb: 3072
  admission_reclaim_target_mb: 4096
  admission_poll_interval_seconds: 2
  admission_settle_seconds: 8
  admission_reclaim_enabled: true
  task_execution_lease_seconds: 60
  reclaim_leader_lease_seconds: 15
  memory_probe_source: auto

streams:
  dispatch_maxlen: 10000
  task_input_maxlen: 10000
  task_output_maxlen: 50000
  stream_maxlen: 10000

observability:
  otel_enabled: false
  otel_service_name: opencitadel-api
  otel_exporter_endpoint: ''
  langfuse_enabled: false

mcp_config:
  mcpServers:
    amap-maps-streamableHTTP:
      transport: streamable_http
      enabled: false
      description: null
      env: null
      command: null
      args: null
      url: https://mcp.amap.com/mcp?key=YOUR_AMAP_KEY
      headers: null
    jina-mcp-server:
      transport: streamable_http
      enabled: false
      description: null
      env: null
      command: null
      args: null
      url: https://mcp.jina.ai/v1
      headers:
        Authorization: Bearer YOUR_JINA_API_KEY

a2a_config:
  a2a_servers: []

# 模型韧性治理（行为配置唯一来源：AppConfig）
model_resilience:
  enabled: true
  fallback_enabled: false
  allow_cross_provider_fallback: false
  max_attempts_per_call: 3
  max_call_budget_seconds: 120
  breaker_window_seconds: 60
  breaker_error_threshold: 5
  breaker_open_ttl_seconds: 60
  breaker_halfopen_probe_timeout_seconds: 10
  fast_fail_on_open_circuit: true
  dlq_replay_enabled: false
  dlq_replay_batch_size: 4
  dlq_replay_interval_seconds: 5

knowledge_base:
  vector_enabled: true
  chunk:
    parent_max_chars: 2000
    child_max_chars: 400
    overlap: 50
  retrieval:
    vector_top_k: 20
    bm25_top_k: 20
    rrf_k: 60
    final_top_k: 8
  rerank:
    enabled: true
    provider: llm
    base_url: null
    api_key_env: null
    model: null
    timeout_seconds: 30
  graphrag:
    enabled: true
    max_parent_chunks_per_doc: 200
    concurrency: 3
  ocr:
    mode: vision_llm
    max_pages: 50
  document:
    max_bytes: 52428800
    max_pages: 1000
  connectors:
    confluence_base_url: null
    feishu_base_url: null
    url_allowlist: []
    url_denylist: []

feature_flags:
  enable_agent_features: true
  enable_marketplace_llm_apps: true
  enable_embeddings: true
  enable_parallel_step_execution: false
  enable_artifacts: true
  enable_hitl_gates: true

hitl:
  plan_gate_enabled: true
  tool_gate_task_level_enabled: true
  tool_gate_call_level_enabled: false
  tool_gate_risk_list:
    - write_file
    - replace_in_file
    - shell_execute
    - mcp_*
    - a2a
    - browser_click
    - browser_input
    - browser_select_option
    - browser_press_key
    - browser_console_exec
  critical_action_patterns:
    - 删除
    - 关闭
    - 关单
    - 退款
    - delete
    - close
    - refund
    - remove
    - confirm close
    - confirm refund
    - btn-confirm-close
    - btn-confirm-refund
  gate_profiles:
    loose:
      first_visit_domain_gate: true
      tool_gate_call_level_enabled: false
      selective_critical_only: false
    standard:
      first_visit_domain_gate: true
      tool_gate_call_level_enabled: true
      selective_critical_only: true
    strict:
      first_visit_domain_gate: true
      tool_gate_call_level_enabled: true
      selective_critical_only: false
  takeover_timeout_minutes: 30

scheduler:
  enabled: true
  poll_interval_seconds: 10.0
  max_concurrent_jobs: 5
  max_concurrent_jobs_per_job: 1
  leader_lease_seconds: 30
  webhook_idempotency_ttl_seconds: 600
