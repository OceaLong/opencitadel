name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-test:
    name: API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: opencitadel
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d opencitadel"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ENV: test
      POSTGRES_HOST: localhost
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: opencitadel
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_DB: 0
      API_KEY_SECRET: b153c2ae8da399ae6a90a2c20bb61f0eee23530a960c2c3630c66354afced9df
      JWT_SECRET: ci-jwt-secret-with-at-least-32-chars!!
      SESSION_SECRET: ci-session-secret-32-chars-min!!
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv==0.11.19
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run pytest
        run: uv run pytest

  ui-test:
    name: UI tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npm run test
      - run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: /api

  docker-build:
    name: Docker build (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: api
            file: api/Dockerfile
            target: api
          - name: worker
            context: api
            file: api/Dockerfile
            target: worker
          - name: migrate
            context: api
            file: api/Dockerfile
            target: api
          - name: ui
            context: ui
            file: ui/Dockerfile
            target: runner
          - name: sandbox
            context: sandbox
            file: sandbox/Dockerfile
            target: ""
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          target: ${{ matrix.target || '' }}
          push: false
          tags: opencitadel-${{ matrix.name }}:ci
          build-args: |
            PIP_INDEX_URL=https://pypi.org/simple/
            UV_INDEX_URL=https://pypi.org/simple/
            NPM_CONFIG_REGISTRY=https://registry.npmjs.org
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
