<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpsConsole — Tickets</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1 id="page-title">OpsConsole</h1>
      <span class="badge">Ticket Operations</span>
    </div>
    <div class="user-bar">
      <span id="current-user">Signed in as {{ user }}</span>
      <a href="/logout" id="btn-logout">Logout</a>
    </div>
  </header>
  <main class="container">
    <section class="filters">
      <h2>Ticket list</h2>
      <form method="get" action="/tickets" id="filter-form" class="filter-row">
        <label for="status">Status</label>
        <select id="status" name="status">
          <option value="">All</option>
          {% for s in statuses %}
          <option value="{{ s }}" {% if status_filter == s %}selected{% endif %}>{{ s }}</option>
          {% endfor %}
        </select>
        <label for="assignee">Assignee</label>
        <select id="assignee" name="assignee">
          <option value="">All</option>
          {% for a in assignees %}
          <option value="{{ a }}" {% if assignee_filter == a %}selected{% endif %}>{{ a }}</option>
          {% endfor %}
        </select>
        <button type="submit" id="btn-filter">Apply filters</button>
      </form>
    </section>
    <table class="data-table" id="ticket-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Title</th>
          <th>Customer</th>
          <th>Status</th>
          <th>Assignee</th>
          <th>Priority</th>
          <th>Amount</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for t in tickets %}
        <tr data-ticket-id="{{ t.id }}">
          <td>#{{ t.id }}</td>
          <td>{{ t.title }}</td>
          <td>{{ t.customer }}</td>
          <td><span class="status status-{{ t.status }}">{{ t.status }}</span></td>
          <td>{{ t.assignee }}</td>
          <td>{{ t.priority }}</td>
          <td>${{ '%.2f'|format(t.amount) }}</td>
          <td><a href="/tickets/{{ t.id }}" id="btn-view-{{ t.id }}">View</a></td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </main>
</body>
</html>
